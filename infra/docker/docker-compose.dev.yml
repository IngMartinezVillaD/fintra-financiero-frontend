# ================================================================
# docker-compose.dev.yml — Ecosistema de desarrollo FRONTEND
# Solo levanta el frontend. El backend corre por separado.
# Uso: docker compose -f infra/docker/docker-compose.dev.yml up -d
# ================================================================
name: fintra-frontend-dev

services:
  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: fintra-frontend
    ports:
      - "4200:80"
    environment:
      API_BASE_URL: http://localhost:8080
    restart: unless-stopped
